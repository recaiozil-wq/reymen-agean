name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit
      - name: Ruff check
        run: ruff check reymen/ --exit-zero
      - name: Bandit security
        run: bandit -r reymen/ -ll --skip B101,B603,B602
        continue-on-error: true

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ `
            --ignore=tests/hermes_legacy `
            --ignore=tests/ReYMeN_reference `
            --ignore=tests/hermes_reference `
            --tb=short `
            -q `
            --timeout=120 `
            -x
        shell: bash
        continue-on-error: true

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results (Python ${{ matrix.python-version }} / ${{ matrix.os }})" >> $GITHUB_STEP_SUMMARY
          echo "CI pipeline completed" >> $GITHUB_STEP_SUMMARY
