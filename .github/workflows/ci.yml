name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check reymen/ tools/ agent/ --exit-zero
        continue-on-error: true

      - name: Security check with bandit
        run: bandit -r reymen/ -ll --skip B101,B603,B602
        continue-on-error: true

      - name: Run tests
        run: |
          pytest tests/ `
            --ignore=tests/ReYMeN_reference `
            --ignore=tests/hermes_reference `
            -x `
            --tb=short `
            -q `
            --timeout=120
        continue-on-error: true

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "CI pipeline completed" >> $GITHUB_STEP_SUMMARY