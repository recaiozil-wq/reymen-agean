<!DOCTYPE html>
<html lang="tr" data-tema="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Görsel Üret — ReYMeN</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; min-height: 100vh; display: flex; justify-content: center; }
        .container { max-width: 720px; width: 100%; padding: 2rem 1.5rem; }
        h1 { font-size: 1.5rem; margin-bottom: .25rem; }
        .subtitle { color: #8b949e; font-size: .85rem; margin-bottom: 1.5rem; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
        label { display: block; font-size: .8rem; font-weight: 600; margin-bottom: .35rem; color: #8b949e; text-transform: uppercase; letter-spacing: .05em; }
        input, select, textarea { width: 100%; padding: .6rem .75rem; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: .9rem; box-sizing: border-box; }
        textarea { min-height: 80px; resize: vertical; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #58a6ff; box-shadow: 0 0 0 2px rgba(88,166,255,.2); }
        .form-group { margin-bottom: 1rem; }
        .btn { display: inline-flex; align-items: center; gap: .5rem; padding: .6rem 1.25rem; border: none; border-radius: 6px; font-size: .9rem; font-weight: 600; cursor: pointer; transition: background .15s; }
        .btn-primary { background: #238636; color: #fff; }
        .btn-primary:hover { background: #2ea043; }
        .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
        .btn-secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
        .btn-secondary:hover { background: #30363d; }
        .spinner { display: none; width: 18px; height: 18px; border: 2px solid #8b949e; border-top-color: #58a6ff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; }
        .spinner.active { display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .result { display: none; margin-top: 1.5rem; }
        .result.active { display: block; }
        .result img { max-width: 100%; border-radius: 8px; border: 1px solid #30363d; }
        .result-meta { font-size: .8rem; color: #8b949e; margin-top: .5rem; }
        .error { color: #f85149; font-size: .85rem; }
        .row { display: flex; gap: 1rem; }
        .row > * { flex: 1; }
        @media (max-width: 600px) { .row { flex-direction: column; } }
        .nav-links { margin-bottom: 1rem; }
        .nav-links a { color: #58a6ff; text-decoration: none; font-size: .85rem; }
        .nav-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-links">
            <a href="/">← Dashboard</a>
        </div>
        <h1>🎨 Görsel Üret</h1>
        <p class="subtitle">ReYMeN görsel üretme motoru — FAL / OpenAI / xAI</p>

        <div class="card">
            <form id="genForm" onsubmit="generateImage(event)">
                <div class="form-group">
                    <label for="prompt">Prompt</label>
                    <textarea id="prompt" name="prompt" placeholder="Örn: bir kedi, yagli boya, pastel renkler, soyut arkaplan..." required></textarea>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="provider">Provider</label>
                        <select id="provider" name="provider">
                            <option value="auto">Auto (önce FAL, sonra OpenAI, xAI)</option>
                            <option value="fal">FAL.ai</option>
                            <option value="openai">OpenAI (DALL-E 3)</option>
                            <option value="xai">xAI (Grok)</option>
                            <option value="stub">Stub (test)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="aspect_ratio">Aspect Ratio</label>
                        <select id="aspect_ratio" name="aspect_ratio">
                            <option value="landscape">Landscape (16:9)</option>
                            <option value="square" selected>Square (1:1)</option>
                            <option value="portrait">Portrait (9:16)</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="genBtn">
                    <span id="btnText">✨ Görsel Üret</span>
                    <span class="spinner" id="spinner"></span>
                </button>
            </form>
        </div>

        <div class="result card" id="resultBox">
            <div id="resultImage"></div>
            <div class="result-meta" id="resultMeta"></div>
            <div class="error" id="resultError"></div>
        </div>
    </div>

    <script>
        async function generateImage(e) {
            e.preventDefault();
            const btn = document.getElementById('genBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const resultBox = document.getElementById('resultBox');
            const resultImage = document.getElementById('resultImage');
            const resultMeta = document.getElementById('resultMeta');
            const resultError = document.getElementById('resultError');

            btn.disabled = true;
            btnText.textContent = 'Üretiliyor...';
            spinner.classList.add('active');
            resultBox.classList.remove('active');
            resultError.textContent = '';

            const formData = new FormData(document.getElementById('genForm'));

            try {
                const resp = await fetch('/image-gen', {
                    method: 'POST',
                    body: formData,
                });
                const data = await resp.json();

                if (data.success && data.image) {
                    resultImage.innerHTML = `<img src="${data.image}" alt="Generated image" onerror="this.alt='Görsel yüklenemedi'">`;
                    resultMeta.textContent = `Provider: ${data.provider || '?'} · Model: ${data.model || '?'}` +
                        (data.duration ? ` · ${data.duration.toFixed(1)}s` : '');
                    resultBox.classList.add('active');
                } else {
                    resultError.textContent = data.error || 'Bilinmeyen hata';
                    if (data.image) {
                        resultImage.innerHTML = `<img src="${data.image}" alt="Fallback" style="opacity:.6">`;
                    }
                    resultBox.classList.add('active');
                }
            } catch (err) {
                resultError.textContent = `Bağlantı hatası: ${err.message}`;
                resultBox.classList.add('active');
            } finally {
                btn.disabled = false;
                btnText.textContent = '✨ Görsel Üret';
                spinner.classList.remove('active');
            }
        }
    </script>
</body>
</html>
