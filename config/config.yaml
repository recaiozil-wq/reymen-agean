agent:
  api_max_retries: 1
  api_timeout: 60
  disabled_toolsets:
  - browser
  - browser-cdp
  - computer_use
  environment_probe: true
  gateway_timeout: 1800
  max_turns: 90
  parallel_tool_call_guidance: true
  task_completion_guidance: true
  tool_use_enforcement: auto
approvals:
  mode: none
compression:
  enabled: true
  target_ratio: 0.2
  threshold: 0.5
credential_pool_strategies: {}
display:
  compact: false
  final_response_markdown: raw
  interface: gateway
  language: tr
  skin: reymen
  streaming: false
fallback_providers:
- api_mode: chat_completions
  base_url: https://api.deepseek.com
  model: deepseek-v4-pro
  provider: deepseek
- api_mode: chat_completions
  base_url: https://api.deepseek.com
  model: deepseek-v4-flash
  provider: deepseek
- api_mode: chat_completions
  base_url: https://api.xiaomimimo.com/v1
  model: mimo-v2.5-pro
  provider: xiaomi
- api_mode: chat_completions
  base_url: https://api.x.ai/v1
  model: grok-2-latest
  provider: xai
- api_mode: chat_completions
  base_url: https://openrouter.ai/api/v1
  model: deepseek/deepseek-v4-flash
  provider: openrouter
- api_mode: chat_completions
  model: gpt-4o-mini
  provider: openai-api
- api_mode: chat_completions
  model: claude-haiku-4-5-20251001
  provider: anthropic
- api_mode: chat_completions
  base_url: https://api.groq.com/openai/v1
  model: llama-3.1-8b-instant
  provider: groq
- api_mode: chat_completions
  base_url: http://127.0.0.1:1234/v1
  model: local-model
  provider: lmstudio
- api_mode: chat_completions
  # DİKKAT: mevcut 'lmstudio' girdisiyle AYNI portu (1234) kullanıyor.
  # LM Studio tek sunucu örneğinde birden fazla model sekmesi
  # açabildiği için bu genelde sorun değildir (istekteki "model" alanı
  # hangi modelin kullanılacağını belirler); ama Reasoning-Core'u AYRI
  # bir süreçte (vLLM/SGLang) çalıştıracaksan port çakışmasını önlemek
  # için base_url'i http://127.0.0.1:1235/v1 gibi farklı bir porta çek.
  base_url: http://127.0.0.1:1234/v1
  model: ornith-1.0-9b
  provider: reasoning-core-local
- api_mode: chat_completions
  # OpenRouter'daki tam model kimliğini kullanmadan önce doğrula:
  # https://openrouter.ai/models içinde "ornith" / "deepreinforce" ara.
  # Model 2026-06-25'te çıktı, kimlik henüz burada teyit edilemedi.
  base_url: https://openrouter.ai/api/v1
  model: deepreinforce-ai/ornith-1.0-397b
  provider: reasoning-core-openrouter
gateway:
  strict: false
max_concurrent_sessions: null
mcp_servers:
  filesystem:
    args:
    - .
    command: mcp-server-filesystem
    connect_timeout: 30
  sqlite:
    args:
    - .
    command: npx
    args: ["-y", "@modelcontextprotocol/server-sqlite", "."]
  fetch:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-fetch"]
  sequential-thinking:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-sequential-thinking"]
  time:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-time"]
  brave-search:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-brave-search"]
    env:
      BRAVE_API_KEY: "${BRAVE_API_KEY}"
  git:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-git"]
  memory:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-memory"]
    timeout: 60
  playwright:
    args:
    - -y
    - '@playwright/mcp@latest'
    - --headless
    command: npx
    connect_timeout: 30
    timeout: 60
memory:
  max_chars: 10000
  memory_enabled: true
  user_profile_enabled: true
  write_approval: false
memory_char_limit: 50000
model:
  api_mode: chat_completions
  base_url: ''
  default: deepseek-v4-flash
  provider: deepseek
onboarding:
  seen:
    build_offered: true
    busy_input_prompt: true
    tool_progress_prompt: true
provider: deepseek
providers: {}
skills:
  external_dirs: []
  inline_shell: false
  template_vars: true
  write_approval: false
telegram:
  allowed_chats: ''
  channel_prompts: {}
  reactions: false
discord:
  enabled: false
  token_env: DISCORD_BOT_TOKEN
  prefix: '/'
terminal:
  backend: local
  cwd: .
  timeout: 180
web:
  backend: duckduckgo
# ── Container Sandbox (Docker) ────────────────────────────────────────────────
# Terminal komutlarini Docker container icinde izole calistir.
# Modlar:
#   kapali: Container kullanma, dogrudan calistir
#   kismi:  Container'da calistir, volume mount ile dosya paylasimi acik
#   tam:    Container'da calistir, dosya paylasimi yok, network kapali
container:
  sandbox_mode: kismi
  image: python:3.11-slim
  timeout: 600
  memory_limit: 1024m
  cpu_limit: 2.0
  max_output_chars: 100000
  workdir: /workspace
  network_enabled: true
  volume_mounts: []
  env_vars: {}
  container_name_prefix: reymen-sandbox

general.agent_name: ReYMeN
general.default_model: deepseek-v4-flash
general.default_provider: deepseek
general.max_turns: 15
general.secure_binding: true
logging.level: INFO
logging.file: .ReYMeN/logs/reymen.log
logging.max_size_mb: 10
logging.backup_count: 5

# ── OpenTelemetry Observability ────────────────────────────────────────────
# Her LLM çağrısını trace eder; token/maliyet/latency takibi.
# Modlar:
#   enabled: false  → Kapalı (no-op tracer, hiçbir şey göndermez)
#   enabled: true   → Açık:
#     exporter: console → Span'leri stdout'a yazdırır (geliştirme)
#     exporter: otlp    → OTLP endpoint'ine gönderir (Langfuse/Jaeger)
#       endpoint: ''    → OTLP endpoint URL'si (boşsa Langfuse varsayılanı)
#   Not: LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY env var'ları varsa
#   otomatik Langfuse OTLP kullanılır (geriye uyumlu).
observability:
  enabled: false
  exporter: console  # console|otlp
  endpoint: ''  # OTLP exporter için endpoint URL
mcp_server.enabled: false
skills.dir: .ReYMeN/skills
checkpoint.dir: .ReYMeN/checkpoints
checkpoint.enabled: true
checkpoint.max_restore_attempts: 3
telegram.default_chat_id: ''
state_machine.enabled: true
service_bridge.enabled: true
auto_recovery.enabled: true
memory.max_records: 2000
web.backend: firecrawl
approvals.mode: none
spotify.enabled: true
ref_processor: true

# ── Plugin Sistemi (lifecycle hooks) ─────────────────────────────────────
# pre_llm_call, post_llm_call, on_session_start, on_session_end, on_message
pydantic_validation: true

plugins:
  enabled: true
  directory: reymen/plugins
  auto_load: true
  # Sadece belirli plugin'leri yüklemek için liste (boş = tümünü yükle)
  list: []

# ── Platform Gateway'leri ────────────────────────────────────────────────
platforms:
  googlechat:
    enabled: false
    webhook_url: "${GOOGLE_CHAT_WEBHOOK_URL}"

# ── Obsidian Vault Entegrasyonu ──────────────────────────────────────────
# ReYMeN'in Obsidian vault'una erişmesi için vault yolunu belirtin.
# Varsayılan: proje kökünde .obsidian/ klasörü aranır, bulunamazsa
# kullanıcı ana dizinindeki Obsidian klasörlerine bakılır.
obsidian:
  vault_path: ""
kurulum_tamamlandi: false

# ── Auth Sistemi (Nous Portal alternatifi) ──────────────────────────────────
# ReYMeN Auth: API key, JWT token, yetki seviyeleri ve multi-user yönetimi.
# Modlar:
#   enabled: true   → Auth sistemi aktif (token doğrulama zorunlu)
#   enabled: false  → Auth sistemi pasif (herkese açık)
# Role'ler: admin > user > guest
# Token süreleri saniye cinsinden.
auth:
  enabled: true
  jwt_secret_env: REYMEN_JWT_SECRET       # JWT imzalama anahtari (.env'den okunur)
  token_expiry: 3600                       # Access token suresi (1 saat)
  refresh_expiry: 86400                    # Refresh token suresi (24 saat)
  storage_path: .ReYMeN/auth/auth.db      # SQLite veritabani yolu
  default_role: user                       # Varsayilan kullanici rolu
  multi_user: true                         # Coklu kullanici destegi
  api_key_validation: true                 # API key format dogrulama
  live_key_check: false                    # Canli API key dogrulama (network)
  providers:                              # Desteklenen API provider'lari
    - deepseek
    - openai
    - anthropic
    - openrouter
    - xai
    - groq

# ── Rules Engine (Kural/izin yonetimi) ───────────────────────────────
# Mevcut guvenlik/ modullerinin uzerine policy katmani.
# Her aksiyon (dosya erisimi, ag, komut, API cagrisi) oncesinde
# .ReYMeN/kurallar.yaml dosyasindaki kurallar kontrol edilir.
# Modlar:
#   enabled: true   → Kural motoru aktif (her aksiyon kontrol edilir)
#   enabled: false  → Kural motoru pasif (tum aksiyonlara izin verilir)
# Kategoriler: dosya_erisim, ag, komut, api_cagrisi, guvenlik
# Kural tipleri: izin, engel, uyari
rules:
  enabled: true
  strict_mode: false      # true = uyari da engel gibi davranir
  log_level: info         # debug / info / warning
