# Pre-commit configuration for ReYMeN-Ajan
# Install: pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: config/mkdocs.yml
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix, --select, E722]
        # E722 = bare except: kurali — bare except kullanimini engeller
      - id: ruff-format
        exclude: scripts/legacy/

  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [--select, E722]
        # E722 = bare except (except: yerine except Exception: zorunlu)
