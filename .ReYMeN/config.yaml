# ── ReYMeN MCP Sunuculari ──────────────────────────────────────────────────
# Model Context Protocol (MCP) sunucu konfigürasyonu.
# Bu dosyadaki sunuculara ReYMeN otomatik bağlanır, tool'ları keşfeder ve motor'a kaydeder.
#
# Kullanım:
#   filesystem:   Yerel dosya sistemi erişimi (npx ile)
#   github:       GitHub API erişimi (opsiyonel, token gerekli)
#   firecrawl:    Web scraping (opsiyonel, API key gerekli)
#
# Detay: https://modelcontextprotocol.io

# ── Web Arama Yapilandirmasi ──────────────────────────────────────────────
# web:
#   backend: "auto"              # Varsayilan: auto-detect
#                                 # Secenekler: duckduckgo, google, bing,
#                                 #             firecrawl, brave, searxng, exa, auto
#   search_backend: "firecrawl"  # WEB_ARAMA icin spesifik backend (opsiyonel)
#                                 # web.backend'den once aranir
#
# Ayrica WEB_SEARCH_BACKEND env var ile de backend secilebilir.
#
# Backend API Key'leri (env var):
#   FIRECRAWL_API_KEY / FIRECRAWL_KEY  → Firecrawl
#   BRAVE_API_KEY                       → Brave Search
#   SEARXNG_URL                         → SearXNG instance URL
#   EXA_API_KEY                         → Exa
#   GOOGLE_API_KEY + GOOGLE_CX          → Google Custom Search
#   BING_API_KEY                        → Bing Web Search

mcp_servers:
  filesystem:
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
    timeout: 30

  # GitHub (opsiyonel - GITHUB_TOKEN ayarlanmali)
  # github:
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-github"]
  #   env:
  #     GITHUB_TOKEN: "${GITHUB_TOKEN}"
  #   timeout: 60

  # Firecrawl (opsiyonel)
  # firecrawl:
  #   url: "https://api.firecrawl.dev/v1/mcp"
  #   headers:
  #     Authorization: "Bearer ${FIRECRAWL_API_KEY}"
  #   timeout: 30

  # Playwright (web otomasyonu)
  playwright:
    command: "npx"
    args: ["-y", "@playwright/mcp"]
    timeout: 60

  # SQLite (veritabani sorgulama)
  # sqlite:
  #   command: "uvx"
  #   args: ["mcp-server-sqlite", "--db", "${PROJE_KOK}/.ReYMeN/reymen.db"]
  #   timeout: 30

  # Memory (hafiza yonetimi)
  # memory:
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-memory"]
  #   timeout: 30
