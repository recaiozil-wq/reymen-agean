[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "reymen-agent"
version = "1.0.0"
description = "ReYMeN Agent — Bagimsiz AI asistani"
requires-python = ">=3.11"
authors = [{name = "ReYMeN Team"}]
license = {text = "MIT"}
keywords = ["ai", "agent", "cli", "reymen", "turkce"]

[project.scripts]
reymen = "reymen_launcher:main"

[tool.setuptools]
packages = [
    "reymen",
    "reymen.ag",
    "reymen.arac",
    "reymen.cereyan",
    "reymen.cli",
    "reymen.cli.subcommands",
    "reymen.core",
    "reymen.desktop",
    "reymen.guvenlik",
    "reymen.hafiza",
    "reymen.mcp",
    "reymen.scripts",
    "reymen.sistem",
    "reymen.sistem.cli_commands",
    "reymen.sistem.cli_commands.handlers",
    "reymen.sistem.cli_commands.handlers.config",
    "reymen.sistem.cli_commands.handlers.edit",
    "reymen.sistem.cli_commands.handlers.session",
    "reymen.sistem.cli_commands.handlers.system",
    "reymen.sistem.cli_commands.handlers.tools",
    "reymen.sistem.plugins",
    "reymen.telegram_bot",
    "reymen.test",
    "reymen.test.test_cli",
    "reymen.test.test_sistem",
    "reymen.web_ui",
    "reymen.windows"
]
py-modules = ["reymen_launcher"]

[project.urls]
Homepage = "https://github.com/Watcher-Hermes/ReYMeN-Ajan-v2"
Source = "https://github.com/Watcher-Hermes/ReYMeN-Ajan-v2"
