{% extends "base.html" %}
{% block title %}Pluginler — ReYMeN Web UI{% endblock %}
{% block content %}
<div class="page-header">
    <h2>🔌 Plugin Yönetimi</h2>
    <button class="btn btn-primary" hx-get="/api/plugins/tazele" hx-target="#plugin-liste">🔄 Tazele</button>
</div>
<div class="kart" id="plugin-liste">
    <div hx-get="/api/plugins" hx-trigger="load, every 30s" hx-swap="innerHTML">
        Yükleniyor...
    </div>
</div>

<div id="plugin-sonuc"></div>
{% endblock %}
{% block scripts %}
<script>
    document.body.addEventListener('htmx:afterRequest', function(evt) {
        if (evt.detail.target && evt.detail.target.id === 'plugin-sonuc') {
            setTimeout(function() {
                document.getElementById('plugin-sonuc').innerHTML = '';
            }, 5000);
        }
    });
</script>
{% endblock %}
