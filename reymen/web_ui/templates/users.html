{% extends "base.html" %}
{% block title %}Kullanıcılar — ReYMeN Web UI{% endblock %}
{% block content %}
<div class="page-header">
    <h2>👤 Kullanıcı Yönetimi</h2>
</div>

<div class="grid-2">
    <div class="kart">
        <h2>📋 Mevcut Kullanıcılar</h2>
        <div hx-get="/api/users" hx-trigger="load, every 10s" hx-swap="innerHTML">
            Yükleniyor...
        </div>
    </div>
    <div class="kart">
        <h2>➕ Yeni Kullanıcı</h2>
        <form hx-post="/api/users/ekle" hx-target="#sonuc" hx-swap="innerHTML">
            <div class="form-group">
                <label>Kullanıcı Adı</label>
                <input type="text" name="username" placeholder="ör: admin2" required>
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" name="password" placeholder="••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">👤 Kullanıcı Ekle</button>
        </form>
    </div>
</div>

<div id="sonuc" class="sonuc-alani"></div>

<div class="kart">
    <h2>🔑 Şifre Değiştir</h2>
    <form hx-post="/api/users/sifre" hx-target="#sifre-sonuc" hx-swap="innerHTML">
        <div class="form-group">
            <label>Kullanıcı Adı</label>
            <input type="text" name="username" placeholder="mevcut kullanıcı" required>
        </div>
        <div class="form-group">
            <label>Yeni Şifre</label>
            <input type="password" name="password" placeholder="••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">🔑 Şifre Değiştir</button>
    </form>
    <div id="sifre-sonuc" class="sonuc-alani"></div>
</div>

{% endblock %}
{% block scripts %}
<script>
    document.body.addEventListener('htmx:afterRequest', function(evt) {
        if (evt.detail.target && (evt.detail.target.id === 'sonuc' || evt.detail.target.id === 'sifre-sonuc')) {
            setTimeout(function() { evt.detail.target.innerHTML = ''; }, 5000);
        }
    });
</script>
{% endblock %}
