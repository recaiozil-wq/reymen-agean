{% extends "base.html" %}
{% block title %}Konuşmalar — ReYMeN Web UI{% endblock %}
{% block content %}
<div class="page-header">
    <h2>💬 Agent Konuşma Geçmişi</h2>
    <span class="gri">{{ konusmalar|length }} konuşma</span>
</div>

<div class="kart">
    <div hx-get="/api/konusmalar" hx-trigger="load, every 30s" hx-swap="innerHTML">
        Yükleniyor...
    </div>
</div>

<div class="kart" id="mesaj-detay" style="display:none;">
    <h2>📝 Mesaj Detayı</h2>
    <div id="mesaj-icerik"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
function konusmaAc(konusmaId) {
    document.getElementById('mesaj-detay').style.display = 'block';
    document.getElementById('mesaj-icerik').innerHTML = 'Yükleniyor...';
    
    fetch('/api/konusmalar/' + konusmaId + '/mesajlar')
        .then(r => r.json())
        .then(data => {
            let html = '<div class="conv-messages">';
            if (data.mesajlar && data.mesajlar.length > 0) {
                data.mesajlar.forEach(function(m) {
                    const rol = m.rol || m.role || 'user';
                    const icerik = m.icerik || m.content || '';
                    const zaman = m.zaman || m.timestamp || '';
                    html += '<div class="msg-row">';
                    html += '<span class="msg-' + rol + '">' + (rol === 'user' ? '👤 Kullanıcı' : '🤖 Asistan') + '</span>';
                    if (zaman) html += '<span class="msg-time">' + zaman + '</span>';
                    html += '<div class="msg-content">' + escHtml(icerik.substring(0, 1000)) + '</div>';
                    html += '</div>';
                });
            } else {
                html += '<div class="gri" style="padding:16px;">Henüz mesaj yok.</div>';
            }
            html += '</div>';
            document.getElementById('mesaj-icerik').innerHTML = html;
        })
        .catch(function() {
            document.getElementById('mesaj-icerik').innerHTML = '<div class="gri">Yüklenemedi.</div>';
        });
}

function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
{% endblock %}
