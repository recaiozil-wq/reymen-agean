{% extends "base.html" %}
{% block title %}🔴 Hata Yönetimi{% endblock %}
{% block content %}
<div class="page-header">
    <h1>🔴 Merkezi Hata Toplama</h1>
    <div class="header-actions">
        <button class="btn btn-danger" onclick="hatalariTemizle()">🗑️ Tümünü Temizle</button>
        <button class="btn btn-primary" onclick="bildirimGonder()">📨 Test Bildirimi</button>
    </div>
</div>

<!-- Özet Kartları -->
<div id="hata-ozet" hx-get="/api/hatalar/ozet" hx-trigger="load every 30s" hx-target="this" hx-swap="innerHTML">
    <div class="loader">⏳ Yükleniyor...</div>
</div>

<!-- Filtreler -->
<div class="card" style="margin:1rem 0;">
    <div class="filters">
        <select id="seviye-filtre" class="form-input" onchange="filtrele()" style="width:auto;display:inline-block;">
            <option value="">Tüm Seviyeler</option>
            <option value="CRITICAL">🔴 Kritik</option>
            <option value="ERROR">🟠 Hata</option>
            <option value="WARNING">🟡 Uyarı</option>
            <option value="INFO">🔵 Bilgi</option>
        </select>
        <input type="text" id="kaynak-filtre" class="form-input" placeholder="Kaynak filtresi..."
               style="width:auto;display:inline-block;" oninput="filtrele()">
        <button class="btn btn-sm" onclick="yenile()">🔄 Yenile</button>
    </div>
</div>

<!-- Hata Listesi -->
<div id="hata-liste" hx-get="/api/hatalar?limit=50" hx-trigger="load" hx-target="this" hx-swap="innerHTML">
    <div class="loader">⏳ Yükleniyor...</div>
</div>
{% endblock %}

{% block scripts %}
<script>
function filtrele() {
    const seviye = document.getElementById('seviye-filtre').value;
    const kaynak = document.getElementById('kaynak-filtre').value;
    let url = '/api/hatalar?limit=50';
    if (seviye) url += '&seviye=' + encodeURIComponent(seviye);
    if (kaynak) url += '&kaynak=' + encodeURIComponent(kaynak);
    htmx.ajax('GET', url, {target: '#hata-liste', swap: 'innerHTML'});
}

function yenile() {
    filtrele();
    htmx.ajax('GET', '/api/hatalar/ozet', {target: '#hata-ozet', swap: 'innerHTML'});
}

function hatalariTemizle() {
    if(!confirm('Tüm hata kayıtları silinsin mi?')) return;
    htmx.ajax('POST', '/api/hatalar/temizle', {target: '#hata-liste', swap: 'outerHTML'});
    htmx.ajax('GET', '/api/hatalar/ozet', {target: '#hata-ozet', swap: 'innerHTML'});
}

function bildirimGonder() {
    htmx.ajax('POST', '/api/hatalar/test-bildirim', {
        target: '#toast-container',
        swap: 'beforeend'
    });
}

function traceToggle(id) {
    const el = document.getElementById('trace-' + id);
    if (el) el.classList.toggle('gizli');
}
</script>
{% endblock %}
