{% extends "base.html" %}
{% block title %}⏰ Cron Yönetimi{% endblock %}
{% block content %}
<div class="page-header">
    <h1>⏰ Cron Yönetimi</h1>
    <button class="btn btn-primary" onclick="document.getElementById('ekle-form').classList.toggle('gizli')">➕ Yeni Görev</button>
</div>

<!-- Yeni Görev Ekleme Formu -->
<div id="ekle-form" class="card gizli" style="margin-bottom:1rem;">
    <h3>Yeni Zamanlanmış Görev</h3>
    <form hx-post="/api/cron/ekle" hx-target="#cron-liste" hx-swap="outerHTML" hx-on::after-request="this.reset(); document.getElementById('ekle-form').classList.add('gizli')">
        <div class="form-group">
            <label>Görev Adı</label>
            <input type="text" name="ad" class="form-input" placeholder="ornek-gorev" required>
        </div>
        <div class="form-group">
            <label>Schedule (cron)</label>
            <input type="text" name="zaman" class="form-input" placeholder="0 9 * * *" value="0 9 * * *" required>
            <small class="form-hint">Cron formatı: dakika saat gün ay hafta (örn: 0 9 * * * = her gün 09:00)</small>
        </div>
        <div class="form-group">
            <label>Komut / Kod</label>
            <textarea name="komut" class="form-input" rows="3" placeholder="python -c &quot;print('merhaba')&quot;" required></textarea>
        </div>
        <button type="submit" class="btn btn-success">✅ Ekle</button>
        <button type="button" class="btn btn-secondary" onclick="document.getElementById('ekle-form').classList.add('gizli')">İptal</button>
    </form>
</div>

<!-- Cron Listesi -->
<div hx-get="/api/cron" hx-trigger="load" hx-target="this" hx-swap="outerHTML">
    <div class="loader">⏳ Yükleniyor...</div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Cron işlemleri için yardımcılar
function cronSil(id) {
    if(!confirm('Bu cron görevi silinsin mi?')) return;
    htmx.ajax('POST', `/api/cron/sil/${id}`, {target: '#cron-liste', swap: 'outerHTML'});
}
function cronDurdur(id) {
    htmx.ajax('POST', `/api/cron/durdur/${id}`, {target: '#cron-liste', swap: 'outerHTML'});
}
function cronDevam(id) {
    htmx.ajax('POST', `/api/cron/devam/${id}`, {target: '#cron-liste', swap: 'outerHTML'});
}
function cronCalistir(id) {
    htmx.ajax('POST', `/api/cron/calistir/${id}`, {target: '#cron-liste', swap: 'outerHTML'});
}
</script>
{% endblock %}
