{% extends "base.html" %}
{% block title %}Gateway — ReYMeN Web UI{% endblock %}
{% block content %}
<div class="page-header">
    <h2>🌐 Gateway Kontrol</h2>
    <div class="flex">
        <button class="btn btn-primary" hx-post="/api/gateway/baslat" hx-target="#gateway-sonuc">▶ Başlat</button>
        <button class="btn" hx-post="/api/gateway/restart" hx-target="#gateway-sonuc">🔄 Yeniden Başlat</button>
        <button class="btn btn-danger" hx-post="/api/gateway/durdur" hx-target="#gateway-sonuc">⏹ Durdur</button>
    </div>
</div>
<div id="gateway-sonuc" class="sonuc-alani"></div>

<div class="grid-3">
    <div class="kart">
        <h2>📡 Servisler</h2>
        <div hx-get="/api/gateway" hx-trigger="load, every 10s" hx-swap="innerHTML">
            Yükleniyor...
        </div>
    </div>
    <div class="kart">
        <h2>✈️ Telegram</h2>
        <div hx-get="/api/gateway/telegram" hx-trigger="load, every 10s" hx-swap="innerHTML">
            Yükleniyor...
        </div>
        <div class="flex" style="margin-top:12px">
            <button class="btn btn-sm btn-primary" hx-post="/api/gateway/telegram/baslat" hx-target="#tg-sonuc">▶ Başlat</button>
            <button class="btn btn-sm btn-danger" hx-post="/api/gateway/telegram/durdur" hx-target="#tg-sonuc">⏹ Durdur</button>
            <button class="btn btn-sm" hx-post="/api/gateway/test-mesaj" hx-target="#tg-sonuc">✉️ Test</button>
        </div>
        <div id="tg-sonuc" class="sonuc-alani"></div>
        <div style="margin-top:8px">
            <form hx-post="/api/gateway/telegram/mesaj" hx-target="#tg-sonuc">
                <input type="text" name="chat_id" placeholder="Chat ID (boş=varsayılan)" style="width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:4px 8px;font-size:0.8rem;margin-bottom:4px">
                <textarea name="metin" rows="1" placeholder="Mesaj..." required style="width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:4px 8px;font-size:0.8rem"></textarea>
                <button type="submit" class="btn btn-sm" style="margin-top:4px">✈️ Gönder</button>
            </form>
        </div>
    </div>
    <div class="kart">
        <h2>💬 Discord</h2>
        <div hx-get="/api/gateway/discord" hx-trigger="load, every 10s" hx-swap="innerHTML">
            Yükleniyor...
        </div>
        <div class="flex" style="margin-top:12px">
            <button class="btn btn-sm btn-primary" hx-post="/api/gateway/discord/baslat" hx-target="#dc-sonuc">▶ Başlat</button>
            <button class="btn btn-sm btn-danger" hx-post="/api/gateway/discord/durdur" hx-target="#dc-sonuc">⏹ Durdur</button>
        </div>
        <div id="dc-sonuc" class="sonuc-alani"></div>
        <div style="margin-top:8px">
            <form hx-post="/api/gateway/discord/mesaj" hx-target="#dc-sonuc">
                <input type="text" name="kanal_id" placeholder="Kanal ID" required style="width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:4px 8px;font-size:0.8rem;margin-bottom:4px">
                <textarea name="metin" rows="1" placeholder="Mesaj..." required style="width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:4px 8px;font-size:0.8rem"></textarea>
                <button type="submit" class="btn btn-sm" style="margin-top:4px">💬 Gönder</button>
            </form>
        </div>
    </div>
</div>

<div class="grid-2">
    <div class="kart">
        <h2>📱 SMS (Twilio)</h2>
        <div hx-get="/api/gateway/sms" hx-trigger="load, every 15s" hx-swap="innerHTML">
            Yükleniyor...
        </div>
        <div style="margin-top:8px">
            <form hx-post="/api/gateway/sms/gonder" hx-target="#sms-sonuc">
                <input type="text" name="telefon" placeholder="Telefon (+905*****4567)" required style="width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:4px 8px;font-size:0.8rem;margin-bottom:4px">
                <textarea name="mesaj" rows="1" placeholder="SMS metni..." required style="width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:4px 8px;font-size:0.8rem"></textarea>
                <button type="submit" class="btn btn-sm" style="margin-top:4px">📱 SMS Gönder</button>
            </form>
        </div>
        <div id="sms-sonuc" class="sonuc-alani"></div>
    </div>
    <div class="kart">
        <h2>🔧 Ayarlar</h2>
        <div hx-get="/api/gateway/ayarlar" hx-trigger="load" hx-swap="innerHTML">
            Yükleniyor...
        </div>
    </div>
</div>

{% endblock %}
