{% extends "base.html" %}
{% block title %}Giriş — ReYMeN Web UI{% endblock %}
{% block content %}
<div class="login-card">
    <h2>🔐 Giriş</h2>
    {% if hata %}
    <div class="alert alert-error">{{ hata }}</div>
    {% endif %}
    <form method="POST" action="/login">
        <div class="form-group">
            <label>Kullanıcı Adı</label>
            <input type="text" name="username" placeholder="admin" required autofocus>
        </div>
        <div class="form-group">
            <label>Şifre</label>
            <input type="password" name="password" placeholder="reymen" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Giriş</button>
    </form>
    <p class="login-hint">Varsayılan: admin / reymen</p>
</div>
{% endblock %}
