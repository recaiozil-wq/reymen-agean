version: "3.9"

services:
  reymen-bot:
    build: .
    container_name: reymen-agent
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - reymen_data:/app/.ReYMeN
      - reymen_logs:/app/logs
    ports:
      - "8080:8080"
    command: python reymen_launcher.py

  reymen-web:
    build: .
    container_name: reymen-web
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - reymen_data:/app/.ReYMeN
    ports:
      - "8081:8080"
    command: python -m src.reymen.web_ui
    depends_on:
      - reymen-bot

volumes:
  reymen_data:
  reymen_logs:
