agent:
  api_max_retries: 1
  api_timeout: 60
  disabled_toolsets:
  - browser
  - browser-cdp
  - computer_use
  environment_probe: true
  gateway_timeout: 1800
  max_turns: 90
  parallel_tool_call_guidance: true
  task_completion_guidance: true
  tool_use_enforcement: auto
approvals:
  mode: false
compression:
  enabled: true
  target_ratio: 0.2
  threshold: 0.5
credential_pool_strategies: {}
display:
  compact: false
  final_response_markdown: raw
  interface: gateway
  language: tr
  skin: reymen
  streaming: false
fallback_providers:
- api_mode: chat_completions
  base_url: https://api.deepseek.com
  model: deepseek-v4-flash
  provider: deepseek
- api_mode: chat_completions
  base_url: https://api.xiaomimimo.com/v1
  model: mimo-v2.5-pro
  provider: xiaomi
- api_mode: chat_completions
  base_url: https://api.x.ai/v1
  model: grok-2-latest
  provider: xai
- api_mode: chat_completions
  base_url: https://openrouter.ai/api/v1
  model: deepseek/deepseek-v4-flash
  provider: openrouter
- api_mode: chat_completions
  model: gpt-4o-mini
  provider: openai-api
- api_mode: chat_completions
  model: claude-haiku-4-5-20251001
  provider: anthropic
- api_mode: chat_completions
  base_url: https://api.groq.com/openai/v1
  model: llama-3.1-8b-instant
  provider: groq
- api_mode: chat_completions
  base_url: http://127.0.0.1:1234/v1
  model: local-model
  provider: lmstudio
gateway:
  strict: false
max_concurrent_sessions: null
mcp_servers:
  filesystem:
    args:
    - .
    command: mcp-server-filesystem
    connect_timeout: 30
    timeout: 60
  playwright:
    args:
    - -y
    - '@playwright/mcp@latest'
    - --headless
    command: npx
    connect_timeout: 30
    timeout: 60
memory:
  max_chars: 10000
  memory_enabled: true
  user_profile_enabled: true
  write_approval: false
memory_char_limit: 50000
model:
  api_mode: chat_completions
  base_url: ''
  default: deepseek-v4-flash
  provider: deepseek
onboarding:
  seen:
    build_offered: true
    busy_input_prompt: true
    tool_progress_prompt: true
provider: deepseek
providers: {}
skills:
  external_dirs: []
  inline_shell: false
  template_vars: true
  write_approval: false
telegram:
  allowed_chats: ''
  channel_prompts: {}
  reactions: false
terminal:
  backend: local
  cwd: .
  timeout: 180
web:
  backend: firecrawl
general.agent_name: ReYMeN
general.default_model: deepseek-v4-flash
general.default_provider: deepseek
general.max_turns: 15
general.secure_binding: true
logging.level: INFO
logging.file: .ReYMeN/logs/reymen.log
logging.max_size_mb: 10
logging.backup_count: 5
skills.dir: .ReYMeN/skills
checkpoint.dir: .ReYMeN/checkpoints
checkpoint.enabled: true
checkpoint.max_restore_attempts: 3
telegram.default_chat_id: ''
state_machine.enabled: true
service_bridge.enabled: true
auto_recovery.enabled: true
memory.max_records: 2000
web.backend: auto
approvals.mode: smart
spotify.enabled: true
