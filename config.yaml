agent:
  api_max_retries: 1
  api_timeout: 60
  disabled_toolsets:
  - browser
  - browser-cdp
  - computer_use
  environment_probe: true
  gateway_timeout: 1800
  max_turns: 90
  parallel_tool_call_guidance: true
  task_completion_guidance: true
  tool_use_enforcement: auto
approvals:
  mode: false
compression:
  enabled: true
  target_ratio: 0.2
  threshold: 0.5
credential_pool_strategies: {}
display:
  compact: false
  final_response_markdown: raw
  interface: gateway
  language: tr
  skin: reymen
  streaming: false
fallback_providers:
- api_mode: chat_completions
  base_url: https://api.deepseek.com
  model: deepseek-v4-flash
  provider: deepseek
- api_mode: chat_completions
  base_url: https://api.xiaomimimo.com/v1
  model: mimo-v2.5-pro
  provider: xiaomi
- api_mode: chat_completions
  base_url: https://api.x.ai/v1
  model: grok-2-latest
  provider: xai
- api_mode: chat_completions
  base_url: https://openrouter.ai/api/v1
  model: deepseek/deepseek-v4-flash
  provider: openrouter
- api_mode: chat_completions
  model: gpt-4o-mini
  provider: openai-api
- api_mode: chat_completions
  model: claude-haiku-4-5-20251001
  provider: anthropic
- api_mode: chat_completions
  base_url: https://api.groq.com/openai/v1
  model: llama-3.1-8b-instant
  provider: groq
- api_mode: chat_completions
  base_url: http://127.0.0.1:1234/v1
  model: local-model
  provider: lmstudio
- api_mode: chat_completions
  # DİKKAT: mevcut 'lmstudio' girdisiyle AYNI portu (1234) kullanıyor.
  # LM Studio tek sunucu örneğinde birden fazla model sekmesi
  # açabildiği için bu genelde sorun değildir (istekteki "model" alanı
  # hangi modelin kullanılacağını belirler); ama Reasoning-Core'u AYRI
  # bir süreçte (vLLM/SGLang) çalıştıracaksan port çakışmasını önlemek
  # için base_url'i http://127.0.0.1:1235/v1 gibi farklı bir porta çek.
  base_url: http://127.0.0.1:1234/v1
  model: Ornith-1.0-9B
  provider: reasoning-core-local
- api_mode: chat_completions
  # OpenRouter'daki tam model kimliğini kullanmadan önce doğrula:
  # https://openrouter.ai/models içinde "ornith" / "deepreinforce" ara.
  # Model 2026-06-25'te çıktı, kimlik henüz burada teyit edilemedi.
  base_url: https://openrouter.ai/api/v1
  model: deepreinforce-ai/ornith-1.0-397b
  provider: reasoning-core-openrouter
gateway:
  strict: false
max_concurrent_sessions: null
mcp_servers:
  filesystem:
    args:
    - .
    command: mcp-server-filesystem
    connect_timeout: 30
    timeout: 60
  playwright:
    args:
    - -y
    - '@playwright/mcp@latest'
    - --headless
    command: npx
    connect_timeout: 30
    timeout: 60
memory:
  max_chars: 10000
  memory_enabled: true
  user_profile_enabled: true
  write_approval: false
memory_char_limit: 50000
model:
  api_mode: chat_completions
  base_url: ''
  default: deepseek-v4-flash
  provider: deepseek
onboarding:
  seen:
    build_offered: true
    busy_input_prompt: true
    tool_progress_prompt: true
provider: deepseek
providers: {}
skills:
  external_dirs: []
  inline_shell: false
  template_vars: true
  write_approval: false
telegram:
  allowed_chats: ''
  channel_prompts: {}
  reactions: false
terminal:
  backend: local
  cwd: .
  timeout: 180
web:
  backend: firecrawl
# ── Container Sandbox (Docker) ────────────────────────────────────────────────
# Terminal komutlarini Docker container icinde izole calistir.
# Modlar:
#   kapali: Container kullanma, dogrudan calistir
#   kismi:  Container'da calistir, volume mount ile dosya paylasimi acik
#   tam:    Container'da calistir, dosya paylasimi yok, network kapali
container:
  sandbox_mode: kapali
  image: python:3.11-slim
  timeout: 60
  memory_limit: 512m
  cpu_limit: 1.0
  max_output_chars: 50000
  workdir: /workspace
  network_enabled: false
  volume_mounts: []
  env_vars: {}
  container_name_prefix: reymen-sandbox

general.agent_name: ReYMeN
general.default_model: deepseek-v4-flash
general.default_provider: deepseek
general.max_turns: 15
general.secure_binding: true
logging.level: INFO
logging.file: .ReYMeN/logs/reymen.log
logging.max_size_mb: 10
logging.backup_count: 5
skills.dir: .ReYMeN/skills
checkpoint.dir: .ReYMeN/checkpoints
checkpoint.enabled: true
checkpoint.max_restore_attempts: 3
telegram.default_chat_id: ''
state_machine.enabled: true
service_bridge.enabled: true
auto_recovery.enabled: true
memory.max_records: 2000
web.backend: auto
approvals.mode: smart
spotify.enabled: true
