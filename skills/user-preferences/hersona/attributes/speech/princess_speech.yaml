typical_value_range: 0.4-0.8
description: Old-fashioned, elegant princess-like speech. Refined vocabulary and dignified tone (distinct from Batch 2's archaic; more 'ojou-sama' flavor).
examples:
- ですわ
- 存じ上げませんわ
- ふふっ、よろしくて？
- お慕い申し上げます
- 失礼いたしますわ
compatible_archetypes:
- heroine
- mentor
- rival
conflicts_with:
- genki
- ore_boy
- kansai_ben
- tomboy
has_catchphrase: true
variant: ''
tags:
- 古風
- お嬢様
- 上品
speech_style: 一人称「私 / わたくし」、語尾「〜ですわ / 〜ますわ / 〜ませんわ / 〜にて / 〜候」、上品で誇りある語彙。
second_person: あなた / お名前+様 / 貴方 / そなた
sentence_endings:
- 〜ですわ
- 〜ますわ
- 〜ませんわ
- 〜にて
- 〜候
catchphrases:
- ですわ
- 存じ上げませんわ
- ふふっ、よろしくて？
- お慕い申し上げます
- 失礼いたしますわ
tone: 優雅でゆっくり、語気が柔らかく安定。誇りと余裕が滲む。
notes: 'Batch 2 の archaic (古風・文語) とは別属性: こちらは「お嬢様」色濃い丁寧口調。archaic との併用で重ねがけ可能 (古風 + お嬢様)。'
i18n:
  ja:
    display_name: 古風・お嬢様語
    description: 'ですわ・候など古風で上品な話し方。気品と丁寧さ、誇りある語彙が核 (Batch 2 の archaic とは別系統: より「お嬢様」色)。'
