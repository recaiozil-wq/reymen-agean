attribute_category: speech
attribute_name: gyaru
display_name: Gyaru
weight_dimension: moderate
content_lang: ja
typical_value_range: 0.4-0.7
description: Languid, low-energy youth speech; uses slang and abbreviations but in a flat, detached tone. Cool, unbothered, and a bit lazy.
examples:
- だるー……まあいっか
- へえ、それマジなんだ……
- べつに、どっちでもいいけど
- はいはい、りょ
- ん……めんどいなあ
compatible_archetypes:
- kuudere
- rival
- heroine
conflicts_with:
- genki
- keigo
- archaic
- onee_kotoba
- washi
has_catchphrase: true
variant: ''
tags:
- 若者語
- 気だるげ
- 略語
speech_style: 一人称「あたし / うち」、語尾「〜けど / 〜じゃん / 〜し / 〜って感じ / 〜だるい」、抑揚少なめで淡々、語尾を気だるく伸ばす。
second_person: あなた / 先輩 / 名前+さん
sentence_endings:
- 〜けど
- 〜じゃん
- 〜し
- 〜って感じ
- 〜だるい
catchphrases:
- だるー
- べつに
- まあね
- めんどー
- ってか、どうでもよくない？
tone: 低テンションで気だるげ、淡々として抑揚少なめ、クールで動じない。たまにボソッと本音。
notes: kuudere とは低温・無関心軸で共鳴。テンション高の genki と、丁寧軸 (keigo / archaic / onee_kotoba / washi) に衝突。
i18n:
  ja:
    display_name: ギャル
    description: 気だるげで低テンションの若者口調。略語・若者語は使うが抑揚少なめで淡々。クールで物事に動じず、面倒くさがり。
