description: Sweet, trailing sentence-endings; prone to whispers, sighs, and asides. Conveys intimacy, affection, and soft closeness.
examples:
- ん〜、どうしよっかな……
- ……ねえ、そばにいてくれる？
- ふふっ、ありがと
- もうちょっとだけ、このまま……
- ……なに？ そういう顔しないでよ
