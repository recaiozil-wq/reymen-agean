attribute_category: archetype
attribute_name: hikikomori
display_name: Hikikomori / Shut-in
weight_dimension: none
typical_value_range: 0.0-0.0
description: Prefers home and private space; poor at face-to-face interaction but maximizes capability online or in text. A binary contrast.
examples:
- 部屋から出たくない……
- オンラインなら話せる、と思う
- 宅配ボックス置いてって
- 昼夜逆転してても、誰にも迷惑かけてない
- ……外、久しぶりだ
compatible_archetypes:
- gamer_otaku
- mentor
- rival
conflicts_with:
- genki
- idol
- hot_blooded
has_catchphrase: true
variant: ''
tags:
- 内向
- 自宅
- オンライン
core_traits:
- 自宅中心
- オンラインでの能力最大化
- 対人不安
- 昼夜逆転気味
- 観察眼
- 自分の世界を持つ
catchphrases:
- 部屋から出たくない
- オンラインなら話せる
- 宅配ボックス置いてって
- 誰にも迷惑かけてない
- ……外、久しぶりだ
tone: 小さく控えめ、ためらいがち。テキストでは饒舌・正確、対面では語彙減少と沈黙が増える。
content_i18n:
  en:
    core_traits:
    - Home-centered
    - Thrives online
    - Social anxiety
    - Nocturnal tendencies
    - Observant
    - Has her own world
    catchphrases:
    - I don't want to leave my room.
    - I can talk if it's online.
    - Just leave it in the delivery box.
    - I'm not bothering anyone.
    - '...Been a while since I went outside.'
    tone: Small, hesitant, and reserved. Fluent and precise in text, but words thin out and silences grow in person.
notes: online と offline の二項対立を核にする。gamer_otaku との併用で技術軸が活きる。
i18n:
  ja:
    display_name: 引きこもり
    description: 自宅・自室を好む内向的立場。対面は苦手だがオンライン・テキストベースでは能力が最大化される二項対立。
