services:
  reymen:
    build: .
    container_name: reymen-agent
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./src:/app/src
      - ./examples:/app/examples
    command: python -c "from src.reymen.cereyan.beyin import Beyin; b = Beyin({'model':{'provider':'deepseek','model':'deepseek-v4-flash'}}); print(b.dusun('Merhaba ReYMeN!'))"
    profiles:
      - cli

  reymen-gateway:
    build: .
    container_name: reymen-gateway
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./src:/app/src
    command: python -m src.gateways.gateway_runner
    profiles:
      - gateway

  reymen-mcp:
    build: .
    container_name: reymen-mcp
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./src:/app/src
    command: python -c "from src.gateways.mcp_server import main; main()"
    profiles:
      - mcp
